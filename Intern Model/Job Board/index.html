        <div className="inner">
          <div className="sec-label">Explore by field</div>
          <h2 className="sec-title light">Browse by category</h2>
          <div className="cats-grid">
            {cats.map(c => (
              <div key={c.name} className="cat-card" onClick={() => setPage('jobs')} role="button" tabIndex={0}>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: '1.2rem', color: 'var(--violet-light)' }}>{c.icon}</div>
                <div className="cat-name">{c.name}</div>
                <div className="cat-count">{c.count} open {c.count === 1 ? 'role' : 'roles'}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Companies */}
      <section className="section section-chalk">
        <div className="inner">
          <div className="sec-label">Top employers</div>
          <h2 className="sec-title">Companies hiring now</h2>
          <div className="companies-row">
            {cos.map(c => (
              <div key={c.name} className="co-card" onClick={() => setPage('jobs')}>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: '1.5rem', color: 'var(--violet)' }}>{c.em}</div>
                <div className="co-cname">{c.name}</div>
                <div className="co-jobs">{c.jobs} open roles</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* CTA */}
      <div className="cta-section">
        <div className="cta-glow" />
        <div style={{ position: 'relative', zIndex: 1 }}>
          <div className="sec-label" style={{ justifyContent: 'center', marginBottom: '1rem', color: 'var(--violet-light)' }}>For companies</div>
          <h2 className="cta-title">
            Hiring someone great<br />
            <em style={{ fontFamily: 'var(--font-serif)', color: 'rgba(255,255,255,0.35)' }}>starts here.</em>
          </h2>
          <p className="cta-sub">Post a job and put it in front of the people who'll actually care about what you're building.</p>
          <button className="cta-btn" onClick={() => setPage('register')}>
            Post a role — it's free <Icon.Arrow />
          </button>
        </div>
      </div>
    </>
  );
}

/* ─────────────────────────────────────────────────────────
   JOBS PAGE
───────────────────────────────────────────────────────── */
function JobsPage() {
  const { jobs } = useApp();
  const [search, setSearch] = useState('');
  const [cat, setCat]       = useState('');
  const [remote, setRemote] = useState(false);

  const cats = ['All', ...new Set(jobs.map(j => j.category))];

  const filtered = jobs.filter(j => {
    if (j.status !== 'active') return false;
    if (search && !j.title.toLowerCase().includes(search.toLowerCase()) && !j.company.toLowerCase().includes(search.toLowerCase())) return false;
    if (cat && cat !== 'All' && j.category !== cat) return false;
    if (remote && !j.remote) return false;
    return true;
  });

  return (
    <div style={{ background: 'var(--ivory)', minHeight: '100vh', paddingTop: '64px' }}>
      <div style={{ background: 'var(--ink)', padding: '3rem 3rem 0' }}>
        <div className="inner">
          <div style={{ paddingBottom: '2rem' }}>
            <div className="sec-label" style={{ color: 'var(--violet-light)' }}>All opportunities</div>
            <h1 className="sec-title light">Browse jobs</h1>
          </div>
        </div>
      </div>

      <div style={{ padding: '2rem 3rem', maxWidth: '1160px', margin: '0 auto' }}>
        <div className="filters-bar">
          <div className="filter-search">
            <Icon.Search />
            <input
              placeholder="Search roles or companies"
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
          </div>
          {cats.slice(0, 6).map(c => (
            <button
              key={c}
              className={`filter-pill${(cat === c || (!cat && c === 'All')) ? ' active' : ''}`}
              onClick={() => setCat(c === 'All' ? '' : c)}
            >
              {c}
            </button>
          ))}
          <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.78rem', color: 'var(--text-dim)', cursor: 'pointer', whiteSpace: 'nowrap' }}>
            <input
              type="checkbox"
              checked={remote}
              onChange={e => setRemote(e.target.checked)}
              style={{ accentColor: 'var(--violet)' }}
            />
            Remote only
          </label>
          <span className="results-count">{filtered.length} result{filtered.length !== 1 ? 's' : ''}</span>
        </div>

        {filtered.length > 0
          ? <div className="jobs-grid">{filtered.map(j => <JobCard key={j.id} job={j} />)}</div>
          : (
            <div className="empty">
              <div className="empty-icon">◌</div>
              <div className="empty-title">No roles found</div>
              <div className="empty-sub">Try adjusting your filters or search term.</div>
            </div>
          )
        }
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   JOB DETAIL
───────────────────────────────────────────────────────── */
function JobDetail() {
  const { selectedJob, user, setPage, applyJob, toast } = useApp();
  const [modal, setModal]   = useState(false);
  const [letter, setLetter] = useState('');
  const [resume, setResume] = useState(null);
  const [busy, setBusy]     = useState(false);
  const fileRef             = useRef(null);

  if (!selectedJob) { setPage('jobs'); return null; }
  const j = selectedJob;

  const handleApply = () => {
    if (!user) { toast('Sign in to apply', 'error'); setPage('login'); return; }
    if (user.role !== 'candidate') { toast('Only candidates can apply', 'error'); return; }
    setModal(true);
  };

  const submit = async (e) => {
    e.preventDefault();
    if (!letter.trim()) { toast('Add a cover letter', 'error'); return; }
    setBusy(true);
    await new Promise(r => setTimeout(r, 700));
    const ok = applyJob(j.id, { coverLetter: letter, resumeName: resume?.name || 'resume.pdf' });
    setBusy(false);
    if (ok) { setModal(false); setLetter(''); setResume(null); }
  };

  return (
    <div style={{ background: 'var(--ivory)', minHeight: '100vh', paddingTop: '64px' }}>
      <div className="detail-wrap">
        <button className="detail-back" onClick={() => setPage('jobs')}>
          <Icon.Back /> Back to jobs
        </button>

        <div className="detail-header">
          <div className="detail-co-row">
            <div className="detail-logo">{j.logo}</div>
            <div>
              <div className="detail-title">{j.title}</div>
              <div className="detail-co">{j.company}</div>
            </div>
          </div>
          <div className="detail-pills">
            <span className="detail-pill"><Icon.Pin />{j.location}</span>
            <span className="detail-pill"><Icon.Brief />{j.type}</span>
            <span className="detail-pill violet">{j.experience}</span>
            {j.remote && <span className="detail-pill green"><Icon.Wifi />Remote</span>}
          </div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: '1.1rem', color: 'var(--green)', fontWeight: '600', marginTop: '1rem' }}>
            {j.salary}
          </div>
          <button className="detail-apply" onClick={handleApply}>Apply for this role →</button>
        </div>

        <div className="detail-section">
          <div className="detail-sec-title">About this role</div>
          <div className="detail-body">{j.description}</div>
        </div>

        <div className="detail-section">
          <div className="detail-sec-title">What we're looking for</div>
          {j.requirements.map((r, i) => (
            <div key={i} className="detail-req-item">
              <div className="detail-req-dot" />
              <span>{r}</span>
            </div>
          ))}
        </div>

        <div className="detail-section">
          <div className="detail-sec-title">Benefits</div>
          <div>{j.benefits.map((b, i) => <span key={i} className="benefit-tag">{b}</span>)}</div>
        </div>
      </div>

      {/* Apply modal */}
      {modal && (
        <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) setModal(false); }}>
          <div className="modal-box">
            <div className="modal-head">
              <div className="modal-title">Apply — {j.title}</div>
              <button className="modal-close" onClick={() => setModal(false)}><Icon.X /></button>
            </div>
            <div className="modal-body">
              <div className="fg">
                <label>Cover letter *</label>
                <textarea
                  rows="5"
                  placeholder="Why are you a great fit for this role? Be specific."
                  value={letter}
                  onChange={e => setLetter(e.target.value)}
                />
              </div>
              <div className="fg">
                <label>Resume / CV</label>
                <div className="upload-area" onClick={() => fileRef.current && fileRef.current.click()}>
                  <input
                    ref={fileRef}
                    type="file"
                    accept=".pdf,.doc,.docx"
                    style={{ display: 'none' }}
                    onChange={e => setResume(e.target.files[0] || null)}
                  />
                  <div className="upload-icon"><Icon.Up /></div>
                  <div className="upload-text">
                    {resume
                      ? <strong>{resume.name}</strong>
                      : <><strong>Click to upload</strong> or drag and drop</>
                    }
                  </div>
                </div>
              </div>
              <button
                className="form-submit"
                onClick={submit}
                disabled={busy || !letter.trim()}
              >
                {busy ? 'Sending…' : 'Submit application →'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   AUTH
───────────────────────────────────────────────────────── */
function AuthPage({ mode }) {
  const { login, register, setPage, toast } = useApp();
  const [role, setRole] = useState('candidate');
  const [f, setF]       = useState({ name: '', email: '', password: '', company: '', title: '', location: '' });
  const [busy, setBusy] = useState(false);
  const upd = (k, v)    => setF(p => ({ ...p, [k]: v }));

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true);
    await new Promise(r => setTimeout(r, 400));
    if (mode === 'login') {
      const ok = login(f.email, f.password, role);
      setBusy(false);
      if (ok) setPage(role === 'employer' ? 'emp-dash' : 'can-dash');
      else toast('Incorrect credentials — check email, password, and account type', 'error');
    } else {
      const ok = register({ ...f, role });
      setBusy(false);
      if (ok) setPage(role === 'employer' ? 'emp-dash' : 'can-dash');
    }
  };

  return (
    <div style={{ background: 'var(--ivory)', minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '5rem 1.5rem' }}>
      <div style={{ width: '100%', maxWidth: '420px' }}>
        <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: '2rem', color: 'var(--obsidian)', letterSpacing: '-0.03em' }}>
            {mode === 'login' ? 'Welcome back' : 'Create account'}
          </div>
          <div style={{ fontSize: '0.85rem', color: 'var(--text-dim)', marginTop: '0.4rem' }}>
            {mode === 'login' ? 'Sign in to continue' : 'Start your search today'}
          </div>
        </div>

        <div style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.06)', borderRadius: '20px', padding: '2rem', boxShadow: '0 8px 32px rgba(0,0,0,0.06)' }}>
          <div className="role-tabs">
            <button className={`role-tab${role === 'candidate' ? ' active' : ''}`} onClick={() => setRole('candidate')}>Job Seeker</button>
            <button className={`role-tab${role === 'employer'  ? ' active' : ''}`} onClick={() => setRole('employer')}>Employer</button>
          </div>

          <form onSubmit={submit}>
            {mode === 'register' && (
              <div className="fg">
                <label>Full name</label>
                <input required value={f.name} onChange={e => upd('name', e.target.value)} placeholder="Your full name" />
              </div>
            )}
            <div className="fg">
              <label>Email</label>
              <input type="email" required value={f.email} onChange={e => upd('email', e.target.value)} placeholder="you@company.com" />
            </div>
            <div className="fg">
              <label>Password</label>
              <input type="password" required minLength="6" value={f.password} onChange={e => upd('password', e.target.value)} placeholder="Min 6 characters" />
            </div>
            {mode === 'register' && role === 'employer' && (
              <div className="fg">
                <label>Company name</label>
                <input required value={f.company} onChange={e => upd('company', e.target.value)} placeholder="Acme Inc." />
              </div>
            )}
            {mode === 'register' && role === 'candidate' && (
              <div className="fg-row">
                <div className="fg" style={{ marginBottom: 0 }}>
                  <label>Job title</label>
                  <input value={f.title} onChange={e => upd('title', e.target.value)} placeholder="e.g. Engineer" />
                </div>
                <div className="fg" style={{ marginBottom: 0 }}>
                  <label>Location</label>
                  <input value={f.location} onChange={e => upd('location', e.target.value)} placeholder="City or Remote" />
                </div>
              </div>
            )}
            <button type="submit" className="form-submit" disabled={busy} style={{ marginTop: '1.25rem' }}>
              {busy ? 'Please wait…' : mode === 'login' ? 'Sign in →' : 'Create account →'}
            </button>
          </form>

          <div className="form-link">
            {mode === 'login'
              ? <><span>No account? </span><button onClick={() => setPage('register')}>Sign up</button></>
              : <><span>Have an account? </span><button onClick={() => setPage('login')}>Sign in</button></>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   PROFILE FORM
───────────────────────────────────────────────────────── */
function ProfileForm({ user, onUpdate, isEmployer }) {
  const [f, setF]       = useState({
    name:     user.name     || '',
    email:    user.email    || '',
    company:  user.company  || '',
    title:    user.title    || '',
    location: user.location || '',
    bio:      user.bio      || '',
    website:  user.website  || '',
    linkedin: user.linkedin || '',
  });
  const [busy, setBusy] = useState(false);

  const sub = async (e) => {
    e.preventDefault();
    setBusy(true);
    await new Promise(r => setTimeout(r, 400));
    onUpdate(f);
    setBusy(false);
  };

  return (
    <div className="profile-card">
      <div className="profile-title">Profile settings</div>
      <form onSubmit={sub}>
        <div className="fg-row">
          <div className="fg">
            <label>Full name</label>
            <input value={f.name} onChange={e => setF({ ...f, name: e.target.value })} />
          </div>
          <div className="fg">
            <label>Email</label>
            <input type="email" disabled value={f.email} />
          </div>
        </div>
        {isEmployer && (
          <div className="fg">
            <label>Company</label>
            <input value={f.company} onChange={e => setF({ ...f, company: e.target.value })} />
          </div>
        )}
        {!isEmployer && (
          <div className="fg-row">
            <div className="fg">
              <label>Job title</label>
              <input value={f.title} onChange={e => setF({ ...f, title: e.target.value })} placeholder="e.g. Product Designer" />
            </div>
            <div className="fg">
              <label>Location</label>
              <input value={f.location} onChange={e => setF({ ...f, location: e.target.value })} />
            </div>
          </div>
        )}
        <div className="fg">
          <label>Bio</label>
          <textarea rows="3" value={f.bio} onChange={e => setF({ ...f, bio: e.target.value })} placeholder="A short intro about yourself…" />
        </div>
        <div className="fg-row">
          <div className="fg">
            <label>Website</label>
            <input type="url" value={f.website} onChange={e => setF({ ...f, website: e.target.value })} placeholder="https://" />
          </div>
          <div className="fg">
            <label>LinkedIn</label>
            <input type="url" value={f.linkedin} onChange={e => setF({ ...f, linkedin: e.target.value })} placeholder="https://linkedin.com/in/…" />
          </div>
        </div>
        <button type="submit" className="form-submit" disabled={busy}>
          {busy ? 'Saving…' : 'Save changes →'}
        </button>
      </form>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   EMPLOYER DASHBOARD
───────────────────────────────────────────────────────── */
function EmpDash() {
  const { user, jobs, apps, postJob, updateJob, deleteJob, updateApp, updateProfile, setPage, setSelectedJob } = useApp();
  const [tab, setTab]         = useState('jobs');
  const [jobModal, setJobModal] = useState(false);
  const [editJob, setEditJob]   = useState(null);
  const [jf, setJf]             = useState({
    title: '', location: '', type: 'Full-time', salary: '', category: 'Engineering',
    experience: 'Mid-level', remote: false, description: '', requirements: '', benefits: '',
  });

  useEffect(() => {
    if (!user || user.role !== 'employer') setPage('login');
  }, [user]);

  if (!user || user.role !== 'employer') return null;

  const mine   = jobs.filter(j => j.employerId === user.id);
  const myApps = apps.filter(a => mine.some(j => j.id === a.jobId));

  const stats = [
    { label: 'Active jobs',   val: mine.filter(j => j.status === 'active').length, icon: '◼' },
    { label: 'Applications',  val: myApps.length, icon: '△' },
    { label: 'Pending',       val: myApps.filter(a => a.status === 'pending').length, icon: '○' },
    { label: 'Accepted',      val: myApps.filter(a => a.status === 'accepted').length, icon: '✦' },
  ];

  const openNew = () => {
    setEditJob(null);
    setJf({ title: '', location: '', type: 'Full-time', salary: '', category: 'Engineering', experience: 'Mid-level', remote: false, description: '', requirements: '', benefits: '' });
    setJobModal(true);
  };

  const openEdit = (j) => {
    setEditJob(j);
    setJf({ ...j, requirements: j.requirements.join('\n'), benefits: j.benefits.join(', ') });
    setJobModal(true);
  };

  const submitJob = (e) => {
    e.preventDefault();
    const data = {
      ...jf,
      requirements: jf.requirements.split('\n').map(r => r.trim()).filter(Boolean),
      benefits:      jf.benefits.split(',').map(b => b.trim()).filter(Boolean),
    };
    if (editJob) updateJob(editJob.id, data);
    else postJob(data);
    setJobModal(false);
  };

  return (
    <div style={{ background: 'var(--ivory)', minHeight: '100vh', paddingTop: '64px' }}>
      <div style={{ background: 'var(--ink)', padding: '2.5rem 3rem' }}>
        <div style={{ maxWidth: '1100px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
          <div>
            <div style={{ fontFamily: 'var(--font-serif)', fontSize: '1.75rem', color: '#fff', letterSpacing: '-0.03em' }}>Dashboard</div>
            <div style={{ fontSize: '0.82rem', color: 'var(--slate)', marginTop: '3px' }}>Welcome back, {user.name.split(' ')[0]}</div>
          </div>
          <button className="nav-btn-fill" onClick={openNew} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
            <Icon.Plus /> Post a job
          </button>
        </div>
      </div>

      <div className="dash-wrap">
        <div className="stat-cards">
          {stats.map(s => (
            <div key={s.label} className="stat-card">
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: '1rem', color: 'var(--violet)', marginBottom: '0.25rem' }}>{s.icon}</div>
              <div className="sc-val">{s.val}</div>
              <div className="sc-label">{s.label}</div>
            </div>
          ))}
        </div>

        <div className="dash-tabs">
          {['jobs', 'applications', 'profile'].map(t => (
            <button key={t} className={`dash-tab${tab === t ? ' active' : ''}`} onClick={() => setTab(t)} style={{ textTransform: 'capitalize' }}>
              {t === 'jobs' ? 'My Jobs' : t === 'applications' ? 'Applications' : 'Profile'}
            </button>
          ))}
        </div>

        {/* My Jobs tab */}
        {tab === 'jobs' && (
          mine.length > 0
            ? mine.map(j => {
                const appCount = apps.filter(a => a.jobId === j.id).length;
                return (
                  <div key={j.id} className="app-row">
                    <div className="app-job-logo">{j.logo}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="app-job-title">{j.title}</div>
                      <div className="app-job-co">{j.location} · {j.type} · {appCount} applicant{appCount !== 1 ? 's' : ''}</div>
                    </div>
                    <div className="app-actions">
                      <span className={`badge badge-${j.status}`}>{j.status}</span>
                      <button className="act-btn act-edit" title="View" onClick={() => { setSelectedJob(j); setPage('job-detail'); }}><Icon.View /></button>
                      <button className="act-btn act-edit" title="Edit" onClick={() => openEdit(j)}><Icon.Edit /></button>
                      <button className="act-btn act-del"  title="Delete" onClick={() => deleteJob(j.id)}><Icon.Trash /></button>
                    </div>
                  </div>
                );
              })
            : (
              <div className="empty">
                <div className="empty-icon">◌</div>
                <div className="empty-title">No jobs posted yet</div>
                <div className="empty-sub">Post your first role to start receiving applications.</div>
              </div>
            )
        )}

        {/* Applications tab */}
        {tab === 'applications' && (
          myApps.length > 0
            ? myApps.map(a => {
                const j = jobs.find(j => j.id === a.jobId);
                return (
                  <div key={a.id} className="app-row no-click" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '0.5rem' }}>
                      <div>
                        <div className="app-job-title">{a.candidateName}</div>
                        <div className="app-job-co">
                          {a.candidateEmail} · Applied for <em>{j?.title || 'Deleted role'}</em>
                        </div>
                      </div>
                      <div className="app-actions">
                        <span className={`badge badge-${a.status}`}>{a.status}</span>
                        {a.status === 'pending' && (
                          <>
                            <button className="act-btn act-review" onClick={() => updateApp(a.id, 'reviewed')}>Review</button>
                            <button className="act-btn act-accept" onClick={() => updateApp(a.id, 'accepted')}><Icon.Check /> Accept</button>
                            <button className="act-btn act-reject" onClick={() => updateApp(a.id, 'rejected')}>Reject</button>
                          </>
                        )}
                        {a.status === 'reviewed' && (
                          <>
                            <button className="act-btn act-accept" onClick={() => updateApp(a.id, 'accepted')}><Icon.Check /> Accept</button>
                            <button className="act-btn act-reject" onClick={() => updateApp(a.id, 'rejected')}>Reject</button>
                          </>
                        )}
                      </div>
                    </div>
                    {a.coverLetter && (
                      <div className="cover-preview">{a.coverLetter}</div>
                    )}
                    <div style={{ fontSize: '0.7rem', color: 'var(--slate)', fontFamily: 'var(--font-mono)', marginTop: '0.5rem' }}>
                      Applied {new Date(a.appliedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}
                      {a.resumeName && <> · 📄 {a.resumeName}</>}
                    </div>
                  </div>
                );
              })
            : (
              <div className="empty">
                <div className="empty-icon">△</div>
                <div className="empty-title">No applications yet</div>
                <div className="empty-sub">Applications will appear here once candidates apply to your roles.</div>
              </div>
            )
        )}

        {/* Profile tab */}
        {tab === 'profile' && <ProfileForm user={user} onUpdate={updateProfile} isEmployer={true} />}
      </div>

      {/* Job post/edit modal */}
      {jobModal && (
        <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) setJobModal(false); }}>
          <div className="modal-box" style={{ maxWidth: '640px' }}>
            <div className="modal-head">
              <div className="modal-title">{editJob ? 'Edit job posting' : 'Post a new job'}</div>
              <button className="modal-close" onClick={() => setJobModal(false)}><Icon.X /></button>
            </div>
            <div className="modal-body">
              <form onSubmit={submitJob}>
                <div className="job-form-grid">
                  <div className="fg">
                    <label>Job title *</label>
                    <input required value={jf.title} onChange={e => setJf({ ...jf, title: e.target.value })} placeholder="Senior Designer" />
                  </div>
                  <div className="fg">
                    <label>Location *</label>
                    <input required value={jf.location} onChange={e => setJf({ ...jf, location: e.target.value })} placeholder="Remote or City, Country" />
                  </div>
                  <div className="fg">
                    <label>Type</label>
                    <select value={jf.type} onChange={e => setJf({ ...jf, type: e.target.value })}>
                      <option>Full-time</option>
                      <option>Part-time</option>
                      <option>Contract</option>
                      <option>Internship</option>
                    </select>
                  </div>
                  <div className="fg">
                    <label>Salary *</label>
                    <input required value={jf.salary} onChange={e => setJf({ ...jf, salary: e.target.value })} placeholder="$80k – $120k" />
                  </div>
                  <div className="fg">
                    <label>Category</label>
                    <select value={jf.category} onChange={e => setJf({ ...jf, category: e.target.value })}>
                      <option>Engineering</option>
                      <option>Design</option>
                      <option>Marketing</option>
                      <option>Data</option>
                      <option>Sales</option>
                      <option>Writing</option>
                      <option>Finance</option>
                      <option>Operations</option>
                    </select>
                  </div>
                  <div className="fg">
                    <label>Experience level</label>
                    <select value={jf.experience} onChange={e => setJf({ ...jf, experience: e.target.value })}>
                      <option>Entry-level</option>
                      <option>Mid-level</option>
                      <option>Senior</option>
                      <option>Staff</option>
                      <option>Executive</option>
                    </select>
                  </div>
                </div>
                <div className="fg">
                  <label>Description *</label>
                  <textarea rows="3" required value={jf.description} onChange={e => setJf({ ...jf, description: e.target.value })} placeholder="What will this person do? What makes this role exciting?" />
                </div>
                <div className="fg">
                  <label>Requirements (one per line)</label>
                  <textarea rows="4" value={jf.requirements} onChange={e => setJf({ ...jf, requirements: e.target.value })} placeholder={"5+ years experience\nExcellent communication\nStrong portfolio"} />
                </div>
                <div className="fg">
                  <label>Benefits (comma-separated)</label>
                  <input value={jf.benefits} onChange={e => setJf({ ...jf, benefits: e.target.value })} placeholder="Equity, Remote, Healthcare, Learning Budget" />
                </div>
                <label style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '0.82rem', color: 'var(--text-dim)', cursor: 'pointer', marginBottom: '1.25rem' }}>
                  <input type="checkbox" checked={jf.remote} onChange={e => setJf({ ...jf, remote: e.target.checked })} style={{ accentColor: 'var(--violet)' }} />
                  This is a remote-eligible role
                </label>
                <button type="submit" className="form-submit">
                  {editJob ? 'Save changes →' : 'Post job →'}
                </button>
              </form>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   CANDIDATE DASHBOARD
───────────────────────────────────────────────────────── */
function CanDash() {
  const { user, jobs, apps, updateProfile, setPage, setSelectedJob } = useApp();
  const [tab, setTab] = useState('apps');

  useEffect(() => {
    if (!user || user.role !== 'candidate') setPage('login');
  }, [user]);

  if (!user || user.role !== 'candidate') return null;

  const mine = apps.filter(a => a.candidateId === user.id);

  const stats = [
    { label: 'Applied',   val: mine.length, icon: '△' },
    { label: 'Pending',   val: mine.filter(a => a.status === 'pending').length, icon: '○' },
    { label: 'Reviewed',  val: mine.filter(a => a.status === 'reviewed').length, icon: '◇' },
    { label: 'Accepted',  val: mine.filter(a => a.status === 'accepted').length, icon: '✦' },
  ];

  return (
    <div style={{ background: 'var(--ivory)', minHeight: '100vh', paddingTop: '64px' }}>
      <div style={{ background: 'var(--ink)', padding: '2.5rem 3rem' }}>
        <div style={{ maxWidth: '1100px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
          <div>
            <div style={{ fontFamily: 'var(--font-serif)', fontSize: '1.75rem', color: '#fff', letterSpacing: '-0.03em' }}>My Applications</div>
            <div style={{ fontSize: '0.82rem', color: 'var(--slate)', marginTop: '3px' }}>Hey {user.name.split(' ')[0]}, here's your progress</div>
          </div>
          <button className="nav-btn-fill" onClick={() => setPage('jobs')}>Browse jobs →</button>
        </div>
      </div>

      <div className="dash-wrap">
        <div className="stat-cards">
          {stats.map(s => (
            <div key={s.label} className="stat-card">
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: '1rem', color: 'var(--violet)', marginBottom: '0.25rem' }}>{s.icon}</div>
              <div className="sc-val">{s.val}</div>
              <div className="sc-label">{s.label}</div>
            </div>
          ))}
        </div>

        <div className="dash-tabs">
          {['apps', 'profile'].map(t => (
            <button key={t} className={`dash-tab${tab === t ? ' active' : ''}`} onClick={() => setTab(t)}>
              {t === 'apps' ? 'Applications' : 'Profile'}
            </button>
          ))}
        </div>

        {tab === 'apps' && (
          mine.length > 0
            ? mine.map(a => {
                const j = jobs.find(j => j.id === a.jobId);
                if (!j) return null;
                return (
                  <div key={a.id} className="app-row" onClick={() => { setSelectedJob(j); setPage('job-detail'); }}>
                    <div className="app-job-logo">{j.logo}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="app-job-title">{j.title}</div>
                      <div className="app-job-co">{j.company} · {j.location}</div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', flexShrink: 0 }}>
                      <span className={`badge badge-${a.status}`}>{a.status}</span>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: '0.65rem', color: 'var(--slate)' }}>
                        {new Date(a.appliedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                      </span>
                    </div>
                  </div>
                );
              })
            : (
              <div className="empty">
                <div className="empty-icon">◌</div>
                <div className="empty-title">No applications yet</div>
                <div className="empty-sub">Browse open roles and apply to start tracking here.</div>
                <button className="btn-primary" style={{ margin: '1.5rem auto 0', display: 'flex' }} onClick={() => setPage('jobs')}>
                  Browse jobs <Icon.Arrow />
                </button>
              </div>
            )
        )}

        {tab === 'profile' && <ProfileForm user={user} onUpdate={updateProfile} isEmployer={false} />}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   FOOTER
───────────────────────────────────────────────────────── */
function Footer() {
  const { setPage } = useApp();
  return (
    <footer>
      <div className="footer-inner">
        <div className="footer-top">
          <div>
            <div className="footer-brand-name">JobFlow</div>
            <p className="footer-brand-sub">Curated jobs at companies building things worth working on. No noise. No algorithms. Just roles.</p>
          </div>
          <div>
            <div className="footer-col-title">Job seekers</div>
            <button className="footer-col-link" onClick={() => setPage('jobs')}>Browse roles</button>
            <button className="footer-col-link" onClick={() => setPage('register')}>Create account</button>
            <button className="footer-col-link" onClick={() => setPage('can-dash')}>My dashboard</button>
          </div>
          <div>
            <div className="footer-col-title">Employers</div>
            <button className="footer-col-link" onClick={() => setPage('register')}>Post a role</button>
            <button className="footer-col-link" onClick={() => setPage('login')}>Employer login</button>
            <button className="footer-col-link" onClick={() => setPage('emp-dash')}>Dashboard</button>
          </div>
          <div>
            <div className="footer-col-title">Company</div>
            <button className="footer-col-link">About</button>
            <button className="footer-col-link">Blog</button>
            <button className="footer-col-link">Privacy</button>
          </div>
        </div>
        <div className="footer-bottom">
          <div className="footer-copy">© 2024 JobFlow · Built with care</div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: '0.65rem', color: 'rgba(255,255,255,0.15)' }}>v2.1 · Portfolio project</div>
        </div>
      </div>
    </footer>
  );
}

/* ─────────────────────────────────────────────────────────
   APP SHELL
───────────────────────────────────────────────────────── */
function App() {
  const { page } = useApp();
  const showFooter = !['emp-dash', 'can-dash', 'login', 'register'].includes(page);

  const pages = {
    'home':       <HomePage />,
    'jobs':       <JobsPage />,
    'job-detail': <JobDetail />,
    'login':      <AuthPage mode="login" />,
    'register':   <AuthPage mode="register" />,
    'emp-dash':   <EmpDash />,
    'can-dash':   <CanDash />,
  };

  return (
    <>
      <Navbar />
      <main>{pages[page] || <HomePage />}</main>
      {showFooter && <Footer />}
      <Toasts />
    </>
  );
}

/* ─────────────────────────────────────────────────────────
   MOUNT
───────────────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <AppProvider>
    <App />
  </AppProvider>
);
</script>
</body>
</html>
