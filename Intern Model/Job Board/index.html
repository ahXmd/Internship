<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobFlow — Find Work That Matters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ── TOKENS ─────────────────────────────────────────────── */
:root {
  --obsidian:    #0C0C10;
  --ink:         #14141C;
  --card-dark:   #1A1A26;
  --border-dark: rgba(255,255,255,0.07);
  --ivory:       #FAFAF8;
  --champagne:   #F0E6D3;
  --violet:      #7C3AED;
  --violet-light:#A78BFA;
  --violet-glow: rgba(124,58,237,0.35);
  --slate:       #8B8FA8;
  --text-dim:    #6B7080;
  --green:       #10B981;
  --amber:       #F59E0B;
  --red:         #EF4444;
  --font-serif:  'DM Serif Display', Georgia, serif;
  --font-sans:   'DM Sans', system-ui, sans-serif;
  --font-mono:   'JetBrains Mono', monospace;
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:    cubic-bezier(0.16,1,0.3,1);
}

/* ── RESET & BASE ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-sans);background:var(--ivory);color:var(--obsidian);overflow-x:hidden}

/* ── SCROLLBAR ──────────────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--obsidian)}
::-webkit-scrollbar-thumb{background:var(--violet);border-radius:10px}

/* ── 3D SCENE ───────────────────────────────────────────── */
.scene-wrap{
  position:absolute;inset:0;overflow:hidden;
  perspective:900px;perspective-origin:60% 50%;
  pointer-events:none;
}
.scene{
  position:absolute;width:420px;height:420px;
  right:8%;top:50%;transform:translateY(-50%);
  transform-style:preserve-3d;
  animation:sceneFloat 8s ease-in-out infinite;
  pointer-events:auto;
}
@keyframes sceneFloat{
  0%,100%{transform:translateY(-50%) rotateX(4deg) rotateY(-8deg)}
  50%{transform:translateY(calc(-50% - 18px)) rotateX(-2deg) rotateY(6deg)}
}
.jcard-3d{
  position:absolute;width:340px;
  background:var(--card-dark);
  border:1px solid var(--border-dark);
  border-radius:16px;padding:20px 24px;
  backface-visibility:hidden;
  transition:transform 0.5s var(--ease-out);
  box-shadow:0 24px 60px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.04) inset;
}
.jcard-3d:nth-child(4){
  transform:rotateY(-18deg) rotateX(6deg) translateZ(60px);
  top:0;left:0;
}
.jcard-3d:nth-child(5){
  transform:rotateY(-14deg) rotateX(3deg) translateZ(0px) translateY(50px) translateX(30px);
  opacity:0.75;
}
.jcard-3d:nth-child(6){
  transform:rotateY(-10deg) rotateX(0deg) translateZ(-60px) translateY(100px) translateX(60px);
  opacity:0.45;
}
.scene:hover .jcard-3d:nth-child(4){transform:rotateY(-22deg) rotateX(8deg) translateZ(80px) translateY(-10px)}
.scene:hover .jcard-3d:nth-child(5){transform:rotateY(-16deg) rotateX(4deg) translateZ(10px) translateY(60px) translateX(40px)}
.scene:hover .jcard-3d:nth-child(6){transform:rotateY(-10deg) rotateX(0deg) translateZ(-50px) translateY(120px) translateX(80px)}

.jcard-3d .co-logo{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;margin-bottom:12px;
  background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.2);
}
.jcard-3d .co-title{color:#fff;font-size:0.9rem;font-weight:600;margin-bottom:3px;font-family:var(--font-sans)}
.jcard-3d .co-sub{color:var(--slate);font-size:0.72rem;font-family:var(--font-mono)}
.jcard-3d .co-chips{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.jcard-3d .chip{
  padding:4px 10px;border-radius:6px;font-size:0.65rem;
  font-family:var(--font-mono);font-weight:500;
  background:rgba(255,255,255,0.06);color:var(--slate);border:1px solid rgba(255,255,255,0.05);
}
.jcard-3d .chip.violet{background:rgba(124,58,237,0.2);color:var(--violet-light);border-color:rgba(124,58,237,0.2)}
.jcard-3d .co-salary{font-family:var(--font-mono);font-size:0.78rem;color:var(--green);margin-top:12px;font-weight:500}

/* Orbiting glow rings */
.ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(124,58,237,0.15);
  pointer-events:none;
}
.ring1{width:500px;height:500px;top:-40px;left:-80px;animation:spin1 22s linear infinite}
.ring2{width:320px;height:320px;top:50px;left:50px;animation:spin1 14s linear infinite reverse;border-color:rgba(167,139,250,0.1)}
@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.dot{
  position:absolute;border-radius:50%;
  background:var(--violet-light);opacity:0.5;
  animation:dotFloat 6s ease-in-out infinite;
}
.dot1{width:4px;height:4px;top:15%;left:20%;animation-delay:0s}
.dot2{width:3px;height:3px;top:60%;left:70%;animation-delay:2s}
.dot3{width:5px;height:5px;top:40%;left:55%;animation-delay:4s}
@keyframes dotFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ── NAVBAR ─────────────────────────────────────────────── */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:0 3rem;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background 0.4s, border-color 0.4s;
  border-bottom:1px solid transparent;
}
.navbar.scrolled{
  background:rgba(12,12,16,0.88);
  backdrop-filter:blur(20px) saturate(1.6);
  border-color:var(--border-dark);
}
.nav-logo{
  font-family:var(--font-serif);font-size:1.4rem;letter-spacing:-0.02em;
  color:#fff;cursor:pointer;user-select:none;
  display:flex;align-items:center;gap:0.5rem;
}
.logo-dot{
  width:8px;height:8px;background:var(--violet);border-radius:50%;
  box-shadow:0 0 12px var(--violet);
  animation:logoPulse 2s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{box-shadow:0 0 8px var(--violet)}50%{box-shadow:0 0 20px var(--violet)}}
.nav-links{display:flex;align-items:center;gap:0.25rem}
.nav-link{
  padding:0.5rem 1rem;border-radius:8px;
  font-size:0.82rem;font-weight:500;letter-spacing:0.01em;
  color:rgba(255,255,255,0.5);cursor:pointer;
  transition:all 0.2s;border:none;background:none;font-family:var(--font-sans);
}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.06)}
.nav-link.active{color:#fff}
.nav-btn-outline{
  padding:0.5rem 1.2rem;border-radius:8px;
  font-size:0.82rem;font-weight:500;
  color:rgba(255,255,255,0.7);cursor:pointer;
  border:1px solid rgba(255,255,255,0.15);background:transparent;
  transition:all 0.2s;font-family:var(--font-sans);
}
.nav-btn-outline:hover{border-color:rgba(255,255,255,0.35);color:#fff}
.nav-btn-fill{
  padding:0.5rem 1.4rem;border-radius:8px;
  font-size:0.82rem;font-weight:600;
  color:#fff;cursor:pointer;
  background:var(--violet);border:none;
  transition:all 0.2s;letter-spacing:0.01em;
  box-shadow:0 4px 16px rgba(124,58,237,0.35);
  font-family:var(--font-sans);
}
.nav-btn-fill:hover{background:#6d28d9;box-shadow:0 6px 24px rgba(124,58,237,0.5);transform:translateY(-1px)}
.nav-user{display:flex;align-items:center;gap:0.75rem}
.nav-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--violet),#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;color:#fff;
}
.nav-name{font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.7)}
.nav-logout{
  font-size:0.78rem;color:rgba(255,255,255,0.35);cursor:pointer;
  background:none;border:none;transition:color 0.2s;font-family:var(--font-sans);
}
.nav-logout:hover{color:#EF4444}

.mob-nav{
  position:fixed;inset:0;z-index:999;
  background:rgba(12,12,16,0.97);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.5rem;transform:translateX(100%);transition:transform 0.4s var(--ease-out);
}
.mob-nav.open{transform:translateX(0)}
.mob-nav-link{
  font-family:var(--font-serif);font-size:2rem;color:rgba(255,255,255,0.5);
  cursor:pointer;transition:color 0.2s;background:none;border:none;
}
.mob-nav-link:hover{color:#fff}
.mob-close{
  position:absolute;top:1.5rem;right:2rem;
  background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.5rem;cursor:pointer;
}

/* ── HERO ───────────────────────────────────────────────── */
#hero{
  min-height:100vh;
  background:var(--obsidian);
  position:relative;
  display:flex;align-items:center;
  overflow:hidden;
}
.hero-noise{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.6;pointer-events:none;
}
.hero-grad{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 30% 50%,rgba(124,58,237,0.08) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 70% 20%,rgba(167,139,250,0.06) 0%,transparent 60%);
}
.hero-content{
  position:relative;z-index:10;
  padding:0 3rem;
  max-width:600px;
  margin-left:max(3rem,calc(50vw - 600px));
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:0.6rem;
  font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--violet-light);margin-bottom:1.75rem;
}
.eyebrow-line{width:32px;height:1px;background:var(--violet-light)}
.hero-h1{
  font-family:var(--font-serif);
  font-size:clamp(3rem,5.5vw,5.2rem);
  line-height:1.05;letter-spacing:-0.03em;
  color:#fff;margin-bottom:0.3rem;
}
.hero-h1 em{color:var(--violet-light);font-style:italic}
.hero-h1-sub{
  font-family:var(--font-serif);font-style:italic;
  font-size:clamp(2.2rem,4vw,3.8rem);
  line-height:1.1;letter-spacing:-0.02em;
  color:rgba(255,255,255,0.28);margin-bottom:1.75rem;
}
.hero-sub{
  font-size:1rem;line-height:1.75;color:rgba(255,255,255,0.45);
  max-width:440px;margin-bottom:2.5rem;font-weight:300;
}
.hero-actions{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap}
.btn-primary{
  padding:0.85rem 2rem;border-radius:10px;
  background:var(--violet);color:#fff;
  font-size:0.9rem;font-weight:600;border:none;cursor:pointer;
  box-shadow:0 8px 24px rgba(124,58,237,0.4);
  transition:all 0.2s var(--ease-out);
  display:inline-flex;align-items:center;gap:0.5rem;
  font-family:var(--font-sans);
}
.btn-primary:hover{background:#6d28d9;transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,0.5)}
.btn-secondary{
  padding:0.85rem 2rem;border-radius:10px;
  background:transparent;color:rgba(255,255,255,0.6);
  font-size:0.9rem;font-weight:500;
  border:1px solid rgba(255,255,255,0.12);cursor:pointer;
  transition:all 0.2s;font-family:var(--font-sans);
  display:inline-flex;align-items:center;gap:0.5rem;
}
.btn-secondary:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.hero-stats{
  display:flex;gap:2.5rem;margin-top:4rem;padding-top:2rem;
  border-top:1px solid rgba(255,255,255,0.06);
}
.stat-n{
  font-family:var(--font-serif);font-size:2.4rem;color:#fff;
  line-height:1;letter-spacing:-0.04em;
}
.stat-l{font-size:0.72rem;color:var(--slate);margin-top:4px;font-weight:400;letter-spacing:0.05em;text-transform:uppercase;font-family:var(--font-mono)}

.hero-search{
  display:flex;align-items:center;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;overflow:hidden;
  max-width:480px;margin-bottom:1.5rem;
  transition:border-color 0.2s;
  backdrop-filter:blur(10px);
}
.hero-search:focus-within{border-color:rgba(124,58,237,0.5)}
.hs-icon{padding:0 1rem;color:var(--slate);flex-shrink:0;display:flex;align-items:center}
.hs-input{
  flex:1;padding:0.9rem 0;background:transparent;
  border:none;outline:none;color:#fff;font-size:0.88rem;
  font-family:var(--font-sans);
}
.hs-input::placeholder{color:rgba(255,255,255,0.25)}
.hs-divider{width:1px;height:28px;background:rgba(255,255,255,0.1);flex-shrink:0}
.hs-loc{
  padding:0 1rem;color:rgba(255,255,255,0.25);
  font-size:0.82rem;white-space:nowrap;cursor:pointer;
}
.hs-btn{
  background:var(--violet);color:#fff;border:none;cursor:pointer;
  padding:0 1.5rem;height:100%;min-height:48px;font-size:0.82rem;font-weight:600;
  font-family:var(--font-sans);
  transition:background 0.2s;white-space:nowrap;
}
.hs-btn:hover{background:#6d28d9}

.popular-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2.5rem;align-items:center}
.ptag{
  font-size:0.72rem;font-family:var(--font-mono);
  padding:5px 12px;border-radius:100px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.4);cursor:pointer;
  transition:all 0.2s;
}
.ptag:hover{border-color:rgba(124,58,237,0.4);color:var(--violet-light)}

.scroll-ind{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  opacity:0.3;animation:scrollBounce 2s ease-in-out infinite;
}
.scroll-ind span{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;color:#fff;text-transform:uppercase}
@keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

/* ── TICKER ─────────────────────────────────────────────── */
.ticker-wrap{
  background:var(--ink);border-top:1px solid var(--border-dark);
  border-bottom:1px solid var(--border-dark);
  padding:0.65rem 0;overflow:hidden;
}
.ticker-inner{
  display:flex;gap:3rem;white-space:nowrap;
  animation:tickerMove 28s linear infinite;
}
.ticker-item{font-family:var(--font-mono);font-size:0.7rem;color:var(--slate)}
.ticker-item strong{color:rgba(255,255,255,0.5)}
@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── SECTIONS ───────────────────────────────────────────── */
.section{padding:6rem 3rem}
.section-dark{background:var(--ink);color:#fff}
.section-light{background:var(--ivory)}
.section-chalk{background:var(--champagne)}
.sec-label{
  font-family:var(--font-mono);font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--violet);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem;
}
.sec-label::after{content:'';flex:0 0 28px;height:1px;background:var(--violet);opacity:0.5}
.sec-title{
  font-family:var(--font-serif);font-size:clamp(2rem,3.5vw,3rem);
  letter-spacing:-0.03em;line-height:1.08;
}
.sec-title.light{color:#fff}
.sec-sub{font-size:0.92rem;color:var(--text-dim);margin-top:0.75rem;line-height:1.7;max-width:480px}
.sec-sub.light{color:var(--slate)}
.inner{max-width:1160px;margin:0 auto}

/* ── JOB CARDS ──────────────────────────────────────────── */
.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;margin-top:2.5rem}
.job-card{
  background:#fff;border:1px solid rgba(0,0,0,0.06);
  border-radius:14px;padding:1.5rem;cursor:pointer;
  transition:all 0.25s var(--ease-out);
  position:relative;overflow:hidden;
}
.job-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.03),transparent);
  opacity:0;transition:opacity 0.3s;
}
.job-card:hover{border-color:rgba(124,58,237,0.2);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.08)}
.job-card:hover::before{opacity:1}
.job-card.dark-card{
  background:var(--card-dark);border-color:var(--border-dark);
}
.job-card.dark-card:hover{border-color:rgba(124,58,237,0.3);box-shadow:0 16px 40px rgba(0,0,0,0.4)}
.jc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.jc-logo{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(167,139,250,0.08));
  border:1px solid rgba(124,58,237,0.1);flex-shrink:0;
}
.jc-logo.dark{background:rgba(124,58,237,0.12);border-color:rgba(124,58,237,0.15)}
.jc-feat{
  font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.12em;
  padding:4px 10px;border-radius:100px;
  background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(167,139,250,0.08));
  color:var(--violet);border:1px solid rgba(124,58,237,0.15);
}
.jc-title{font-size:1rem;font-weight:600;letter-spacing:-0.01em;margin-bottom:2px;color:var(--obsidian)}
.jc-title.light-text{color:#fff}
.jc-co{font-size:0.8rem;color:var(--text-dim)}
.jc-co.light-text{color:var(--slate)}
.jc-meta{
  display:flex;flex-wrap:wrap;gap:0.5rem;margin:1rem 0 0;
  padding-top:1rem;border-top:1px solid rgba(0,0,0,0.05);
  align-items:center;
}
.dark-card .jc-meta{border-color:var(--border-dark)}
.jc-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:6px;
  font-family:var(--font-mono);font-size:0.65rem;font-weight:500;
  background:rgba(0,0,0,0.04);color:var(--text-dim);
}
.dark-card .jc-chip{background:rgba(255,255,255,0.05);color:var(--slate)}
.jc-chip.green{background:rgba(16,185,129,0.08);color:var(--green)}
.jc-chip.violet{background:rgba(124,58,237,0.08);color:var(--violet)}
.dark-card .jc-chip.green{background:rgba(16,185,129,0.12)}
.dark-card .jc-chip.violet{background:rgba(124,58,237,0.15);color:var(--violet-light)}
.jc-salary{
  font-family:var(--font-mono);font-size:0.75rem;color:var(--green);
  margin-left:auto;font-weight:500;
}
.jc-age{font-family:var(--font-mono);font-size:0.62rem;color:var(--slate)}

/* ── FILTERS ────────────────────────────────────────────── */
.filters-bar{
  display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;
  margin-bottom:1.5rem;
}
.filter-pill{
  padding:0.5rem 1.1rem;border-radius:100px;font-size:0.78rem;font-weight:500;
  border:1px solid rgba(0,0,0,0.1);background:#fff;cursor:pointer;
  transition:all 0.2s;color:var(--text-dim);font-family:var(--font-sans);
}
.filter-pill:hover,.filter-pill.active{
  background:var(--obsidian);color:#fff;border-color:var(--obsidian);
}
.filter-search{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.5rem 1rem;border-radius:100px;
  border:1px solid rgba(0,0,0,0.1);background:#fff;
  flex:1;min-width:200px;max-width:320px;
}
.filter-search input{
  flex:1;border:none;outline:none;font-size:0.78rem;color:var(--obsidian);
  font-family:var(--font-sans);background:transparent;
}
.filter-search input::placeholder{color:rgba(0,0,0,0.25)}
.results-count{font-family:var(--font-mono);font-size:0.72rem;color:var(--slate);margin-left:auto}

/* ── CATEGORIES ─────────────────────────────────────────── */
.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:2.5rem}
.cat-card{
  padding:1.5rem;border-radius:14px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.03);
  transition:all 0.25s var(--ease-out);
  display:flex;flex-direction:column;gap:0.75rem;
}
.cat-card:hover{background:rgba(255,255,255,0.06);border-color:rgba(124,58,237,0.25);transform:translateY(-3px)}
.cat-name{font-size:0.9rem;font-weight:600;color:#fff}
.cat-count{font-family:var(--font-mono);font-size:0.68rem;color:var(--slate)}

/* ── COMPANIES ──────────────────────────────────────────── */
.companies-row{

  margin-top:2rem;scrollbar-width:none;
}
.companies-row::-webkit-scrollbar{display:none}
.co-card{
  flex-shrink:0;background:#fff;border:1px solid rgba(0,0,0,0.06);

  display:flex;flex-direction:column;align-items:center;gap:0.75rem;
  transition:all 0.2s;cursor:pointer;
}
.co-card:hover{border-color:rgba(124,58,237,0.2);box-shadow:0 8px 24px rgba(0,0,0,0.07);transform:translateY(-2px)}
.co-card .co-cname{font-size:0.82rem;font-weight:600;color:var(--obsidian)}
.co-card .co-jobs{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-dim)}

/* ── JOB DETAIL ─────────────────────────────────────────── */
.detail-wrap{max-width:760px;margin:0 auto;padding:2rem 3rem 6rem}
.detail-back{
  display:inline-flex;align-items:center;gap:0.5rem;
  font-size:0.82rem;color:var(--slate);cursor:pointer;
  margin-bottom:1.5rem;background:none;border:none;
  transition:color 0.2s;font-family:var(--font-sans);
}
.detail-back:hover{color:var(--obsidian)}
.detail-header{
  background:#fff;border:1px solid rgba(0,0,0,0.06);
  border-radius:16px;padding:2rem;margin-bottom:1rem;
}
.detail-co-row{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1rem}
.detail-logo{
  width:60px;height:60px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
  background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(167,139,250,0.08));
  border:1px solid rgba(124,58,237,0.1);flex-shrink:0;
}
.detail-title{font-size:1.6rem;font-weight:700;letter-spacing:-0.02em;color:var(--obsidian);margin-bottom:4px}
.detail-co{font-size:0.9rem;color:var(--text-dim)}
.detail-pills{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1rem}
.detail-pill{
  padding:6px 14px;border-radius:8px;font-size:0.75rem;font-family:var(--font-mono);
  background:rgba(0,0,0,0.04);color:var(--text-dim);
  display:inline-flex;align-items:center;gap:5px;
}
.detail-pill.green{background:rgba(16,185,129,0.08);color:var(--green)}
.detail-pill.violet{background:rgba(124,58,237,0.08);color:var(--violet)}
.detail-apply{
  width:100%;margin-top:1.5rem;padding:1rem;
  background:var(--violet);color:#fff;border:none;border-radius:10px;
  font-size:0.9rem;font-weight:600;cursor:pointer;
  box-shadow:0 6px 20px rgba(124,58,237,0.35);
  transition:all 0.2s;font-family:var(--font-sans);
}
.detail-apply:hover{background:#6d28d9;transform:translateY(-1px);box-shadow:0 8px 28px rgba(124,58,237,0.45)}
.detail-section{background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:16px;padding:2rem;margin-bottom:1rem}
.detail-sec-title{font-size:0.82rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;font-family:var(--font-mono);color:var(--text-dim);margin-bottom:1rem}
.detail-body{font-size:0.9rem;line-height:1.8;color:var(--obsidian)}
.detail-req-item{display:flex;gap:0.75rem;margin-bottom:0.5rem;font-size:0.88rem;line-height:1.6;color:var(--obsidian)}
.detail-req-dot{width:6px;height:6px;background:var(--violet);border-radius:50%;flex-shrink:0;margin-top:0.55rem}
.benefit-tag{
  display:inline-block;padding:6px 14px;border-radius:8px;
  background:rgba(124,58,237,0.06);color:var(--violet);
  font-size:0.78rem;font-family:var(--font-mono);margin:0 6px 6px 0;
  border:1px solid rgba(124,58,237,0.1);
}

/* ── MODAL ──────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(12,12,16,0.7);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;padding:1.5rem;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:#fff;border-radius:20px;width:100%;max-width:500px;
  max-height:90vh;overflow-y:auto;
  animation:modalUp 0.3s var(--ease-out);
  box-shadow:0 40px 80px rgba(0,0,0,0.3);
}
@keyframes modalUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{
  padding:1.5rem 1.75rem;border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0;z-index:1;
}
.modal-title{font-size:1rem;font-weight:700;letter-spacing:-0.01em;color:var(--obsidian)}
.modal-close{background:rgba(0,0,0,0.06);border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;color:var(--slate);transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(239,68,68,0.08);color:var(--red)}
.modal-body{padding:1.75rem}

/* ── FORM ───────────────────────────────────────────────── */
.fg{margin-bottom:1.1rem}
.fg label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:0.4rem}
.fg input,.fg select,.fg textarea{
  width:100%;padding:0.75rem 1rem;
  border:1.5px solid rgba(0,0,0,0.08);border-radius:10px;
  font-size:0.88rem;color:var(--obsidian);outline:none;
  font-family:var(--font-sans);background:#fff;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--violet);
  box-shadow:0 0 0 3px rgba(124,58,237,0.1);
}
.fg input:disabled{background:rgba(0,0,0,0.02);color:var(--text-dim);cursor:not-allowed}
.fg select{
  appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238B8FA8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 12px center;
  padding-right:2.5rem;
}
.fg textarea{resize:vertical;min-height:100px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.role-tabs{display:flex;gap:0.5rem;margin-bottom:1.25rem}
.role-tab{
  flex:1;padding:0.65rem;border-radius:8px;text-align:center;
  font-size:0.78rem;font-weight:600;cursor:pointer;border:none;
  background:rgba(0,0,0,0.04);color:var(--text-dim);transition:all 0.2s;
  font-family:var(--font-sans);
}
.role-tab.active{background:var(--obsidian);color:#fff}
.form-submit{
  width:100%;padding:0.9rem;border-radius:10px;
  background:var(--violet);color:#fff;border:none;cursor:pointer;
  font-size:0.9rem;font-weight:600;font-family:var(--font-sans);
  box-shadow:0 4px 16px rgba(124,58,237,0.35);
  transition:all 0.2s;margin-top:0.5rem;
}
.form-submit:hover:not(:disabled){background:#6d28d9;transform:translateY(-1px)}
.form-submit:disabled{opacity:0.55;cursor:not-allowed;transform:none}
.form-link{text-align:center;margin-top:1rem;font-size:0.82rem;color:var(--text-dim)}
.form-link button{color:var(--violet);font-weight:600;background:none;border:none;cursor:pointer;font-family:var(--font-sans)}
.form-link button:hover{text-decoration:underline}

/* Upload area */
.upload-area{
  border:2px dashed rgba(124,58,237,0.2);border-radius:10px;
  padding:1.5rem;text-align:center;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;background:rgba(124,58,237,0.02);
}
.upload-area:hover{border-color:rgba(124,58,237,0.4);background:rgba(124,58,237,0.04)}
.upload-icon{font-size:1.5rem;margin-bottom:0.5rem;display:flex;justify-content:center}
.upload-text{font-size:0.8rem;color:var(--text-dim)}
.upload-text strong{color:var(--violet)}

/* ── DASHBOARD ──────────────────────────────────────────── */
.dash-wrap{max-width:1100px;margin:0 auto;padding:2rem 3rem 6rem}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{
  background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:14px;padding:1.25rem 1.5rem;
  display:flex;flex-direction:column;gap:0.25rem;
}
.sc-label{font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)}
.sc-val{font-family:var(--font-serif);font-size:2rem;letter-spacing:-0.04em;color:var(--obsidian);line-height:1}
.dash-tabs{display:flex;gap:0.25rem;margin-bottom:1.5rem;border-bottom:1px solid rgba(0,0,0,0.07);padding-bottom:0}
.dash-tab{
  padding:0.7rem 1.25rem;font-size:0.82rem;font-weight:600;cursor:pointer;
  border:none;background:none;color:var(--text-dim);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s;font-family:var(--font-sans);
}
.dash-tab.active{color:var(--violet);border-color:var(--violet)}
.dash-tab:hover:not(.active){color:var(--obsidian)}

/* App rows */
.app-row{
  background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:14px;
  padding:1.25rem 1.5rem;margin-bottom:0.75rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  flex-wrap:wrap;cursor:pointer;transition:border-color 0.2s;
}
.app-row:hover{border-color:rgba(124,58,237,0.2)}
.app-row.no-click{cursor:default}
.app-job-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(124,58,237,0.06);flex-shrink:0}
.app-job-title{font-size:0.9rem;font-weight:600;color:var(--obsidian)}
.app-job-co{font-size:0.78rem;color:var(--text-dim);margin-top:2px}
.app-actions{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap}

/* Badge */
.badge{
  padding:4px 10px;border-radius:100px;font-size:0.65rem;
  font-family:var(--font-mono);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
}
.badge-pending{background:#FEF3C7;color:#92400E}
.badge-reviewed{background:#DBEAFE;color:#1E40AF}
.badge-accepted{background:#D1FAE5;color:#065F46}
.badge-rejected{background:#FEE2E2;color:#991B1B}
.badge-active{background:#D1FAE5;color:#065F46}
.badge-closed{background:#F3F4F6;color:#6B7280}

/* Action buttons */
.act-btn{
  padding:6px 14px;border-radius:8px;font-size:0.72rem;font-weight:600;cursor:pointer;
  border:1px solid;transition:all 0.15s;font-family:var(--font-sans);
  display:inline-flex;align-items:center;gap:4px;
}
.act-review{background:transparent;border-color:rgba(124,58,237,0.2);color:var(--violet)}
.act-review:hover{background:rgba(124,58,237,0.06)}
.act-accept{background:var(--green);border-color:var(--green);color:#fff}
.act-accept:hover{background:#059669}
.act-reject{background:transparent;border-color:rgba(239,68,68,0.2);color:var(--red)}
.act-reject:hover{background:rgba(239,68,68,0.05)}
.act-edit{background:transparent;border-color:rgba(0,0,0,0.1);color:var(--text-dim)}
.act-edit:hover{border-color:rgba(0,0,0,0.2);color:var(--obsidian)}
.act-del{background:transparent;border-color:rgba(239,68,68,0.15);color:var(--red)}
.act-del:hover{background:rgba(239,68,68,0.05)}

/* Job post form grid */
.job-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}

/* Empty state */
.empty{
  text-align:center;padding:4rem 2rem;background:#fff;
  border:1px solid rgba(0,0,0,0.06);border-radius:16px;
}
.empty-icon{font-size:3rem;margin-bottom:1rem}
.empty-title{font-size:1.1rem;font-weight:700;color:var(--obsidian);margin-bottom:0.4rem}
.empty-sub{font-size:0.85rem;color:var(--text-dim)}

/* ── TOAST ──────────────────────────────────────────────── */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:5000;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.85rem 1.25rem;border-radius:12px;
  min-width:260px;max-width:360px;
  background:var(--ink);border:1px solid var(--border-dark);
  color:#fff;box-shadow:0 12px 32px rgba(0,0,0,0.4);
  animation:toastIn 0.35s var(--ease-out);
}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0}
.toast-success .toast-icon{background:rgba(16,185,129,0.15);color:var(--green)}
.toast-error .toast-icon{background:rgba(239,68,68,0.15);color:var(--red)}
.toast-msg{font-size:0.82rem;font-weight:500;line-height:1.4}

/* ── CTA ────────────────────────────────────────────────── */
.cta-section{
  background:var(--obsidian);padding:6rem 3rem;text-align:center;
  position:relative;overflow:hidden;
}
.cta-glow{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.cta-title{font-family:var(--font-serif);font-size:clamp(2.2rem,4vw,3.5rem);color:#fff;letter-spacing:-0.03em;margin-bottom:1rem}
.cta-sub{font-size:0.95rem;color:var(--slate);max-width:400px;margin:0 auto 2.5rem;line-height:1.7}
.cta-btn{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:1rem 2.5rem;border-radius:12px;
  background:#fff;color:var(--violet);border:none;cursor:pointer;
  font-size:0.95rem;font-weight:700;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  transition:all 0.2s;font-family:var(--font-sans);
}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.4)}

/* ── FOOTER ─────────────────────────────────────────────── */
footer{
  background:var(--obsidian);border-top:1px solid var(--border-dark);
  padding:4rem 3rem 2rem;
}
.footer-inner{max-width:1160px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.footer-brand-name{font-family:var(--font-serif);font-size:1.4rem;color:#fff;margin-bottom:0.75rem}
.footer-brand-sub{font-size:0.8rem;color:var(--slate);line-height:1.75;max-width:240px}
.footer-col-title{font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:1rem}
.footer-col-link{display:block;font-size:0.82rem;color:var(--slate);text-decoration:none;margin-bottom:0.6rem;transition:color 0.2s;cursor:pointer;background:none;border:none;font-family:var(--font-sans);text-align:left;padding:0}
.footer-col-link:hover{color:#fff}
.footer-bottom{border-top:1px solid var(--border-dark);padding-top:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.footer-copy{font-family:var(--font-mono);font-size:0.68rem;color:rgba(255,255,255,0.2)}

/* Profile */
.profile-card{background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:16px;padding:2rem;max-width:540px}
.profile-title{font-size:1rem;font-weight:700;color:var(--obsidian);margin-bottom:1.5rem}

/* Cover letter preview */
.cover-preview{margin-top:0.75rem;padding:0.75rem 1rem;background:rgba(0,0,0,0.02);border-radius:8px;font-size:0.82rem;color:var(--text-dim);line-height:1.7}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:1024px){
  .scene{right:-5%;transform:translateY(-50%) scale(0.85)}
  .footer-top{grid-template-columns:1fr 1fr;gap:2rem}
}
@media(max-width:768px){
  .navbar{padding:0 1.25rem}
  .nav-links,.nav-btn-outline,.nav-btn-fill,.nav-user{display:none}
  .hamburger-btn{display:flex}
  .hero-content{padding:0 1.25rem;margin-left:0}
  .scene{display:none}
  .section{padding:4rem 1.25rem}
  .hero-stats{gap:1.5rem}
  .jobs-grid{grid-template-columns:1fr}
  .detail-wrap,.dash-wrap{padding:1.5rem 1.25rem 5rem}
  .footer-top{grid-template-columns:1fr}
  footer{padding:3rem 1.25rem 2rem}
  .fg-row,.job-form-grid{grid-template-columns:1fr}
  .cta-section{padding:4rem 1.25rem}
}
@media(max-width:480px){
  .hero-h1{font-size:2.6rem}
  .hero-h1-sub{font-size:2rem}
  .hero-search{max-width:100%}
  .hero-stats{flex-wrap:wrap;gap:1rem}
}

/* ── UTILITIES ──────────────────────────────────────────── */
.animate-in{animation:animIn 0.5s var(--ease-out) both}
@keyframes animIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Hamburger button */
.hamburger-btn{
  display:none;background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.6);padding:4px;align-items:center;
}
@media(max-width:768px){.hamburger-btn{display:flex}}
</style>

/* ─────────────────────────────────────────────────────────
   IN-MEMORY STORE (no localStorage)
───────────────────────────────────────────────────────── */
const store = {
  jobs: [...SEED_JOBS],
  users: [],
  apps: [],
  currentUser: null,
};

/* ─────────────────────────────────────────────────────────
   CONTEXT
───────────────────────────────────────────────────────── */
const Ctx = createContext(null);

function AppProvider({ children }) {
  const [user, setUser]           = useState(null);
  const [jobs, setJobsState]      = useState([...SEED_JOBS]);
  const [apps, setAppsState]      = useState([]);
  const [toasts, setToasts]       = useState([]);
  const [page, setPage]           = useState('home');
  const [selectedJob, setSelectedJob] = useState(null);

  const toast = useCallback((msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);

  /* ── Sync store refs so helpers always have fresh data ── */
  const syncJobs = (j) => { store.jobs = j; setJobsState(j); };
  const syncApps = (a) => { store.apps = a; setAppsState(a); };

  /* ── Auth ─────────────────────────────────────────────── */
  const login = (email, pw, role) => {
    const found = store.users.find(u => u.email === email && u.password === pw && u.role === role);
    if (found) {
      store.currentUser = found;
      setUser(found);
      toast(`Welcome back, ${found.name.split(' ')[0]} 👋`);
      return true;
    }
    return false;
  };

  const register = (data) => {
    if (store.users.find(u => u.email === data.email)) {
      toast('Email already in use', 'error');
      return false;
    }
    const u = { ...data, id: Date.now().toString(), createdAt: new Date().toISOString() };
    store.users.push(u);
    store.currentUser = u;
    setUser(u);
    toast('Account created!');
    return true;
  };

  const logout = () => {
    store.currentUser = null;
    setUser(null);
    setPage('home');
    toast('See you soon!');
  };

  /* ── Jobs ─────────────────────────────────────────────── */
  const postJob = (data) => {
    const j = {
      ...data,
      id: Date.now().toString(),
      employerId: user.id,
      company: user.company || user.name,
      logo: (user.company || user.name)[0].toUpperCase(),
      postedAt: new Date().toISOString().split('T')[0],
      status: 'active',
      featured: false,
    };
    syncJobs([...store.jobs, j]);
    toast('Job posted!');
  };

  const updateJob = (id, upd) => {
    syncJobs(store.jobs.map(j => j.id === id ? { ...j, ...upd } : j));
    toast('Job updated!');
  };

  const deleteJob = (id) => {
    syncJobs(store.jobs.filter(j => j.id !== id));
    toast('Job removed.');
  };

  /* ── Applications ─────────────────────────────────────── */
  const applyJob = (jobId, data) => {
    if (store.apps.find(a => a.jobId === jobId && a.candidateId === user.id)) {
      toast('You already applied for this role', 'error');
      return false;
    }
    const a = {
      ...data,
      id: Date.now().toString(),
      jobId,
      candidateId: user.id,
      candidateName: user.name,
      candidateEmail: user.email,
      appliedAt: new Date().toISOString(),
      status: 'pending',
    };
    syncApps([...store.apps, a]);
    toast('Application sent! 🎉');
    return true;
  };

  const updateApp = (id, status) => {
    syncApps(store.apps.map(a => a.id === id ? { ...a, status, updatedAt: new Date().toISOString() } : a));
    toast(`Marked as ${status}`);
  };

  /* ── Profile ──────────────────────────────────────────── */
  const updateProfile = (upd) => {
    const idx = store.users.findIndex(u => u.id === user.id);
    if (idx !== -1) {
      store.users[idx] = { ...store.users[idx], ...upd };
      store.currentUser = store.users[idx];
      setUser(store.users[idx]);
      toast('Profile saved!');
    }
  };

  return (
    <Ctx.Provider value={{
      user, login, register, logout, updateProfile,
      jobs, postJob, updateJob, deleteJob,
      apps, applyJob, updateApp,
      toasts, toast,
      page, setPage,
      selectedJob, setSelectedJob,
    }}>
      {children}
    </Ctx.Provider>
  );
}

const useApp = () => useContext(Ctx);

/* ─────────────────────────────────────────────────────────

───────────────────────────────────────────────────────── */
function Navbar() {
  const { user, logout, page, setPage } = useApp();
  const [scrolled, setScrolled] = useState(false);
  const [mobOpen, setMobOpen]   = useState(false);

  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);

  const go = (p) => { setPage(p); setMobOpen(false); };

  return (
    <>
      <nav className={`navbar${scrolled ? ' scrolled' : ''}`}>
        <div className="nav-logo" onClick={() => go('home')}>
          <div className="logo-dot" />
          JobFlow
        </div>

        <div className="nav-links">
          <button className={`nav-link${page === 'home' ? ' active' : ''}`} onClick={() => go('home')}>Home</button>
          <button className={`nav-link${page === 'jobs' ? ' active' : ''}`} onClick={() => go('jobs')}>Browse Jobs</button>
          {user?.role === 'employer'  && <button className={`nav-link${page === 'emp-dash' ? ' active' : ''}`} onClick={() => go('emp-dash')}>Dashboard</button>}
          {user?.role === 'candidate' && <button className={`nav-link${page === 'can-dash' ? ' active' : ''}`} onClick={() => go('can-dash')}>Dashboard</button>}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
          {user ? (
            <div className="nav-user">
              <div className="nav-avatar">{user.name[0].toUpperCase()}</div>
              <span className="nav-name">{user.name.split(' ')[0]}</span>
              <button className="nav-logout" onClick={logout}>Log out</button>
            </div>
          ) : (
            <>
              <button className="nav-btn-outline" onClick={() => go('login')}>Sign in</button>
              <button className="nav-btn-fill"    onClick={() => go('register')}>Get started</button>
            </>
          )}
          <button className="hamburger-btn" onClick={() => setMobOpen(true)} aria-label="Open menu">
            <Icon.Ham />
          </button>
        </div>
      </nav>

      {/* Mobile nav */}
      <div className={`mob-nav${mobOpen ? ' open' : ''}`}>
        <button className="mob-close" onClick={() => setMobOpen(false)} aria-label="Close menu">
          <Icon.Close />
        </button>
        <button className="mob-nav-link" onClick={() => go('home')}>Home</button>
        <button className="mob-nav-link" onClick={() => go('jobs')}>Browse</button>
        {user?.role === 'employer'  && <button className="mob-nav-link" onClick={() => go('emp-dash')}>Dashboard</button>}
        {user?.role === 'candidate' && <button className="mob-nav-link" onClick={() => go('can-dash')}>Dashboard</button>}
        {!user && <button className="mob-nav-link" onClick={() => go('login')}>Sign in</button>}
        {!user && <button className="mob-nav-link" style={{ color: '#A78BFA' }} onClick={() => go('register')}>Get started →</button>}
        {user  && <button className="mob-nav-link" style={{ color: '#EF4444' }} onClick={() => { logout(); setMobOpen(false); }}>Log out</button>}
      </div>
    </>
  );
}

function JobCard({ job, dark = false }) {
  const { setPage, setSelectedJob } = useApp();
  const days = Math.floor((Date.now() - new Date(job.postedAt)) / (1000 * 60 * 60 * 24));

  return (
    <div
      className={`job-card${dark ? ' dark-card' : ''}`}
      onClick={() => { setSelectedJob(job); setPage('job-detail'); }}
      role="button"
      tabIndex={0}
      onKeyDown={e => e.key === 'Enter' && (setSelectedJob(job), setPage('job-detail'))}
    >
      <div className="jc-top">
        <div className={`jc-logo${dark ? ' dark' : ''}`}>{job.logo}</div>
        {job.featured && <div className="jc-feat">Featured</div>}
      </div>
      <div className={`jc-title${dark ? ' light-text' : ''}`}>{job.title}</div>
      <div className={`jc-co${dark ? ' light-text' : ''}`}>{job.company}</div>
      <div className="jc-meta">
        <span className="jc-chip"><Icon.Pin />{job.location}</span>
        <span className="jc-chip"><Icon.Brief />{job.type}</span>
        {job.remote && <span className="jc-chip green"><Icon.Wifi />Remote</span>}
        <span className="jc-chip violet">{job.experience}</span>
        <span className="jc-salary">{job.salary}</span>
        <span className="jc-age">{days === 0 ? 'Today' : `${days}d ago`}</span>
      </div>
    </div>
  );
}
